<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Walk: Multi-Model Visualizer</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://d3js.org/d3.v6.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; background-color: #f5f5f5; }
        h1 { margin-bottom: 10px; color: #333; }
        
        /* Control Panel Styling */
        .controls { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: inline-block; max-width: 950px; }
        .group { display: inline-block; border-right: 1px solid #ddd; padding-right: 15px; margin-right: 10px; vertical-align: middle; }
        .group:last-child { border-right: none; }
        
        button { padding: 8px 12px; font-size: 14px; margin: 3px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background-color: #eee; transition: background 0.2s; }
        button:hover { background-color: #ddd; }
        button.active { background-color: #007bff; color: white; border-color: #0056b3; }
        button.run { background-color: #28a745; color: white; border-color: #1e7e34; }
        button.stop { background-color: #dc3545; color: white; border-color: #bd2130; }
        button.preset { background-color: #6610f2; color: white; border-color: #520dc2; }

        /* Graph Container */
        #graph {
            width: 100%; max-width: 800px; height: 600px;
            margin: 20px auto; background-color: white;
            border: 1px solid #ccc; border-radius: 4px;
            position: relative; overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }

        /* Nodes and Edges */
        .node {
            position: absolute; width: 55px; height: 55px;
            border: 1px solid #333; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; color: #333;
            cursor: pointer; transition: transform 0.1s; user-select: none;
            background-color: white; z-index: 2;
        }
        .node:hover { transform: scale(1.1); border-width: 2px; }
        
        /* Start Node Highlight Ring */
        .startnode { 
            box-shadow: 0 0 0 4px rgba(200, 53, 0, 0.4); 
            border: 2px solid red !important;
        }
        
        .edge {
            position: absolute; height: 2px; background-color: #999;
            transform-origin: 0% 50%; z-index: 1; pointer-events: stroke;
        }
        .edge-label {
            position: absolute; font-size: 12px; color: #666; background: rgba(255,255,255,0.8);
            padding: 2px; border-radius: 3px; pointer-events: none; z-index: 3;
        }

        /* Toggles */
        .switch { position: relative; display: inline-block; width: 40px; height: 24px; vertical-align: middle; margin: 0 5px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2196F3; }
        input:checked + .slider:before { transform: translateX(16px); }

        #TimeLabel { pointer-events: none; }
        #AdjMatrix { white-space: pre; font-family: monospace; font-size: 11px; margin-top: 20px; text-align: left; background: #fff; padding: 10px; border: 1px solid #ddd; max-height: 200px; overflow: auto; display: none; }
        
        /* Helper text */
        #status-text { margin-top: 5px; font-size: 14px; color: #555; font-style: italic;}
    </style>
</head>
<body>

    <h1>Quantum Walk Visualization</h1>
    
    <div class="controls">
        <div class="group">
            <button onclick="setMode('AddNode')" id="btn-node">Add Node</button>
            <button onclick="setMode('AddEdge')" id="btn-edge">Add Edge</button>
            <button onclick="setMode('Delete')" id="btn-del">Delete</button>
            <button onclick="setMode('SetStart')" id="btn-start">Set Start</button>
        </div>
        
        <div class="group">
            <button class="preset" onclick="load4QubitPreset()">4-Qubit Star</button>
            <button class="preset" onclick="load4QubitCycle()">4-Qubit XY Cycle</button>
            <button class="preset" onclick="load3QubitPreset()">3-Qubit XY Cycle</button>
            <button class="preset" onclick="loadCustomChain()">Linear Spin Chain</button>
        </div>

        <div class="group">
            <span>Weighted Edges:</span>
            <label class="switch">
                <input type="checkbox" id="weight_flag">
                <span class="slider"></span>
            </label>
        </div>

        <div class="group" style="border:none">
            <button class="run" onclick="run()">Run Simulation</button>
            <button class="stop" onclick="stop()">Stop</button>
            <button onclick="reset()">Clear All</button>
        </div>
        <br>
        <button onclick="toggleMatrix()">Show/Hide Matrix</button>
    </div>
    
    <div id="status-text">Ready.</div>

    <div id="graph">
        <div id="TimeLabel" style="position: absolute; top: 10px; right: 10px; font-size: 16px; font-weight: bold;">t: 0.0</div>
    </div>
    
    <div id="AdjMatrix"></div>

    <script>
        // --- Global State ---
        let nodes = [];
        let edges = [];
        let StartNode = null;
        let SelectedNodes = [];
        let mode = 'AddNode';
        let running = false;
        let step = 0;
        let timestep = 0;
        let AdjMatrix = [];
        let SimulationType = "Generic"; 
        let currentQubits = 3; // Default for custom chain

        // Color Scale (White to Bright Green)
        const ColorScale = d3.scaleSequential(d3.interpolateViridis).domain([0, 1]); 


        // --- Initialization ---
        function setMode(newMode) {
            mode = newMode;
            SelectedNodes = [];
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            if(newMode === 'AddNode') document.getElementById('btn-node').classList.add('active');
            if(newMode === 'AddEdge') document.getElementById('btn-edge').classList.add('active');
            if(newMode === 'Delete') document.getElementById('btn-del').classList.add('active');
            if(newMode === 'SetStart') document.getElementById('btn-start').classList.add('active');
            
            updateStatus(`Mode: ${newMode}`);
        }
        setMode('AddNode');

        function updateStatus(text){
            document.getElementById('status-text').innerText = text;
        }

        // --- Core Graph Functions ---
        function reset() {
            nodes = [];
            edges = [];
            StartNode = null;
            running = false;
            timestep = 0;
            SimulationType = "Generic";
            render();
            updateStatus("Canvas cleared.");
        }

        function toggleMatrix() {
            const el = document.getElementById("AdjMatrix");
            el.style.display = el.style.display === "none" ? "block" : "none";
        }

        // --- PRESET 1: 4-Qubit Grid (Star/Hamiltonian4) ---
        function load4QubitPreset() {
            reset();
            SimulationType = "Hamiltonian4"; 
            
            const startX = 200, startY = 100, gap = 100;
            for (let i = 0; i < 16; i++) {
                let row = Math.floor(i / 4);
                let col = i % 4;
                nodes.push({ 
                    id: i, 
                    x: startX + (col * gap), 
                    y: startY + (row * gap),
                    label: i.toString(2).padStart(4, '0')
                });
            }
            StartNode = null; 
            render();
            setMode('SetStart'); 
            alert("Loaded 4-Qubit System.\nPLEASE CLICK A NODE to select the Start State.");
            updateStatus("Mode: 4-Qubit. Select Start Node.");
        }

        // --- PRESET 4: 4-Qubit XY Cycle (NEW) ---
        function load4QubitCycle() {
            reset();
            SimulationType = "Hamiltonian4Cycle"; 
            
            // Grid Layout (Visualizing States 0000 -> 1111)
            const startX = 200, startY = 100, gap = 100;
            for (let i = 0; i < 16; i++) {
                let row = Math.floor(i / 4);
                let col = i % 4;
                nodes.push({ 
                    id: i, 
                    x: startX + (col * gap), 
                    y: startY + (row * gap),
                    label: i.toString(2).padStart(4, '0')
                });
            }
            StartNode = null; 
            render();
            setMode('SetStart'); 
            alert("Loaded 4-Qubit XY Cycle.\nTerms: XYII, YXII, etc + Z fields.\nPLEASE CLICK A NODE to select the Start State.");
            updateStatus("Mode: 4-Qubit XY Cycle. Select Start Node.");
        }

        // --- PRESET 2: 3-Qubit XY Cycle ---
        function load3QubitPreset() {
            reset();
            SimulationType = "Hamiltonian3"; 
            
            const centerX = 400, centerY = 300, radius = 200;
            const numStates = 8; 

            for (let i = 0; i < numStates; i++) {
                let angle = (i / numStates) * 2 * Math.PI - (Math.PI / 2);
                nodes.push({ 
                    id: i, 
                    x: centerX + radius * Math.cos(angle) - 27, 
                    y: centerY + radius * Math.sin(angle) - 27,
                    label: i.toString(2).padStart(3, '0')
                });
            }
            StartNode = null; 
            render();
            setMode('SetStart'); 
            alert("Loaded 3-Qubit XY Cycle.\nPLEASE CLICK A NODE to select the Start State.");
            updateStatus("Mode: 3-Qubit XY. Select Start Node.");
        }

        // --- PRESET 3: Custom Chain (User Input) ---
        function loadCustomChain() {
            let n_str = prompt("Enter number of nodes (qubits n):", "3");
            if(!n_str) return;
            let n = parseInt(n_str);
            if(isNaN(n) || n < 1 || n > 6) {
                alert("Please enter a number between 1 and 6 to ensure performance.");
                return;
            }

            reset();
            currentQubits = n;
            SimulationType = "HamiltonianChain";
            
            // Calculate grid dimensions for layout (approx square)
            let totalStates = Math.pow(2, n);
            let cols = Math.ceil(Math.sqrt(totalStates));
            let rows = Math.ceil(totalStates / cols);
            
            let startX = 100, startY = 80, gapX = 100, gapY = 80;
            if(n >= 5) { gapX = 70; gapY = 60; startX = 50; } // condense for larger n

            for(let i=0; i<totalStates; i++) {
                let r = Math.floor(i / cols);
                let c = i % cols;
                nodes.push({
                    id: i,
                    x: startX + (c * gapX),
                    y: startY + (r * gapY),
                    label: i.toString(2).padStart(n, '0')
                });
            }
            
            StartNode = null;
            render();
            setMode('SetStart');
            alert(`Generated Linear Chain System for n=${n}.\nTerms: XX + YY interactions and Z fields.\n\nPLEASE CLICK A NODE to set Start State.`);
            updateStatus(`Mode: ${n}-Qubit Chain. Select Start Node.`);
        }

        // --- Complex Number Utilities ---
        function ReadComplex(string) {
            string = string.trim().replace(/\s/g, ''); 
            if (!string) return { real: 1, imag: 0 };
            if (/^-?\d*\.?\d*$/.test(string)) return { real: parseFloat(string), imag: 0 };
            if (/^-?\d*\.?\d*j$/.test(string)) return { real: 0, imag: parseFloat(string.replace('j', '')) || 0 };
            const match = string.match(/^([-+]?\d*\.?\d*)([-+]\d*\.?\d*)j$/);
            if (match) return { real: parseFloat(match[1]), imag: parseFloat(match[2]) };
            return { real: 1, imag: 0 };
        }

        function FormatComplex({ real, imag }) {
            if (Math.abs(imag) < 0.001) return real.toFixed(2);
            if (Math.abs(real) < 0.001) return `${imag.toFixed(2)}j`;
            return `${real.toFixed(1)}${imag >= 0 ? '+' : ''}${imag.toFixed(1)}j`;
        }

        function generateAdjacencymatrix() {
            let NodeCount = nodes.length;
            AdjMatrix = Array.from({ length: NodeCount }, () => Array(NodeCount).fill({ real: 0, imag: 0 }));
            edges.forEach(edge => {
                const [node1, node2, weight] = edge;
                try {
                    const { real, imag } = ReadComplex(weight.toString());
                    AdjMatrix[node1][node2] = { real, imag };
                    AdjMatrix[node2][node1] = { real, imag: -imag };
                } catch (e) {}
            });
            const matrixText = AdjMatrix.map(row => row.map(c => FormatComplex(c)).join('\t')).join('\n');
            document.getElementById("AdjMatrix").innerText = matrixText;
            return AdjMatrix.map(row => row.map(c => FormatComplex(c)));
        }

        // --- Render Loop ---
        function render(probabilities = null) {
            const graph = document.getElementById("graph");
            const timeLabel = document.getElementById("TimeLabel");
            graph.innerHTML = "";
            graph.appendChild(timeLabel);

            // Draw Edges (Only for Generic Mode)
            edges.forEach(([u, v, w], index) => {
                const n1 = nodes.find(n => n.id === u);
                const n2 = nodes.find(n => n.id === v);
                if (!n1 || !n2) return;

                const ex = (n1.x + n2.x) / 2;
                const ey = (n1.y + n2.y) / 2;
                const len = Math.hypot(n2.x - n1.x, n2.y - n1.y);
                const angle = Math.atan2(n2.y - n1.y, n2.x - n1.x);

                const div = document.createElement("div");
                div.className = "edge";
                div.style.width = `${len}px`;
                div.style.left = `${n1.x + 27}px`;
                div.style.top = `${n1.y + 27}px`;
                div.style.transform = `rotate(${angle}rad)`;
                div.onclick = () => EdgeClicked(index);
                graph.appendChild(div);

                if(SimulationType === "Generic") {
                    const lbl = document.createElement("div");
                    lbl.className = "edge-label";
                    lbl.innerText = w;
                    lbl.style.left = `${ex + 15}px`;
                    lbl.style.top = `${ey}px`;
                    graph.appendChild(lbl);
                }
            });

            // Draw Nodes
            nodes.forEach(node => {
                const el = document.createElement("div");
                el.className = "node";
                el.style.left = `${node.x}px`;
                el.style.top = `${node.y}px`;
                
                let prob = 0;
                if (probabilities && probabilities[node.id] !== undefined) {
                    prob = probabilities[node.id];
                } else if (StartNode === node.id && !probabilities) {
                    prob = 1; 
                }
                
                el.style.backgroundColor = ColorScale(prob);
                el.style.color = prob > 0.4 ? "black" : "white"; 
                
                let displayText = (SimulationType === "Generic") ? node.id : node.label;
                
                if(prob > 0.01) {
                    el.innerHTML = `${displayText}<br><span style="font-size:9px">${prob.toFixed(2)}</span>`;
                } else {
                    el.innerHTML = `${displayText}`;
                }

                if (StartNode === node.id) el.classList.add("startnode");
                el.onclick = () => NodeClicked(node.id);
                graph.appendChild(el);
            });

            if (timeLabel) timeLabel.innerText = `Time: ${timestep.toFixed(2)}`;
        }

        // --- Interactions ---
        function NodeClicked(id) {
            if (SimulationType.startsWith("Hamiltonian")) {
                StartNode = id;
                render();
                updateStatus(`Start State Set to: ${nodes[id].label}`);
                return;
            }

            if (mode === 'SetStart') { StartNode = id; render(); }
            if (mode === 'Delete') {
                nodes = nodes.filter(n => n.id !== id);
                edges = edges.filter(e => !e.includes(id));
                render();
            }
            if (mode === 'AddEdge') {
                SelectedNodes.push(id);
                if (SelectedNodes.length === 2) {
                    const wFlag = document.getElementById("weight_flag").checked;
                    let w = "1";
                    if (wFlag) {
                        w = prompt("Complex weight (e.g. 1j, 0.5):", "1") || "1";
                    }
                    const exists = edges.some(e => (e[0]===SelectedNodes[0] && e[1]===SelectedNodes[1]) || (e[0]===SelectedNodes[1] && e[1]===SelectedNodes[0]));
                    if(!exists) edges.push([...SelectedNodes, w]);
                    SelectedNodes = [];
                    render();
                }
            }
        }

        function EdgeClicked(idx) {
            if (mode === 'Delete') {
                edges.splice(idx, 1);
                render();
            }
        }

        document.getElementById("graph").addEventListener("click", (e) => {
            if (mode === 'AddNode' && SimulationType === 'Generic' && e.target.id === "graph") {
                const rect = e.target.getBoundingClientRect();
                nodes.push({ id: nodes.length, x: e.clientX - rect.left - 27, y: e.clientY - rect.top - 27 });
                render();
            }
        });

        // --- SIMULATION ENGINE ---
        async function run() {
            if (StartNode === null) {
                alert("Please click a node to set the Start Node first.");
                return;
            }
            
            updateStatus("Initializing Python Environment...");
            if (!window.pyodide) window.pyodide = await loadPyodide();
            await pyodide.loadPackage(["numpy", "scipy"]);

            running = true;
            step = 0;
            updateStatus("Running...");
            
            let initCode = "";
            let commonHeader = `
import numpy as np
import scipy.linalg
from functools import reduce

def krons(*args): return reduce(np.kron, args)

I = np.identity(2, dtype=complex)
X = np.array([[0, 1], [1, 0]], dtype=complex)
Y = np.array([[0, -1j], [1j, 0]], dtype=complex)
Z = np.array([[1, 0], [0, -1]], dtype=complex)
ops = {'I': I, 'X': X, 'Y': Y, 'Z': Z}
`;

            if (SimulationType === "Generic") {
                const MatrixData = generateAdjacencymatrix();
                initCode = `
import numpy as np
import scipy.linalg
H = np.array(${JSON.stringify(MatrixData)}, dtype=complex)
state = np.zeros(len(H), dtype=complex)
state[${StartNode}] = 1.0
`;
            } else if (SimulationType === "Hamiltonian4") {
                // 4-Qubit Grid Logic (Legacy)
                initCode = commonHeader + `
sigma_plus = np.array([[0, 1], [0, 0]], dtype=complex) 
sigma_minus = np.array([[0, 0], [1, 0]], dtype=complex)

def get_gate_at_pos(gate, pos, size):
    arr = []
    for i in range(size):
        if i == pos: arr.append(gate)
        else: arr.append(I)
    return krons(*arr)

def get_hop(q1, q2):
    sp1 = get_gate_at_pos(sigma_plus, q1, 4)
    sm2 = get_gate_at_pos(sigma_minus, q2, 4)
    sp2 = get_gate_at_pos(sigma_plus, q2, 4)
    sm1 = get_gate_at_pos(sigma_minus, q1, 4)
    return (sp1 @ sm2) + (sp2 @ sm1)

Z0 = get_gate_at_pos(Z, 0, 4)
X0 = get_gate_at_pos(X, 0, 4)
Y0 = get_gate_at_pos(Y, 0, 4)

term1 = Z0 @ get_hop(1, 2)
term2 = X0 @ get_hop(2, 3)
term3 = Y0 @ get_hop(1, 3)
H = term1 + term2 + term3 

state = np.zeros(16, dtype=complex)
state[${StartNode}] = 1.0
`;
            } else if (SimulationType === "Hamiltonian3") {
                // 3-Qubit XY Cycle
                initCode = commonHeader + `
terms = ['XYI', 'YXI', 'IXY','IYX','YIX','XIY','ZII','IZI','IIZ']
coeffs = [0.5, -0.5, 0.5, -0.5, 0.5, -0.5, 1.0 , 1.0, 1.0]
H = np.zeros((8, 8), dtype=complex)
for term_str, coeff in zip(terms, coeffs):
    matrices = [ops[char] for char in term_str]
    H += coeff * krons(*matrices)
state = np.zeros(8, dtype=complex)
state[${StartNode}] = 1.0
`;
            } else if (SimulationType === "Hamiltonian4Cycle") {
                // --- NEW 4-QUBIT XY CYCLE ---
                initCode = commonHeader + `
terms = ['XYII', 'YXII', 'IXYI','IYXI','IIXY','IIYX','YIIX','XIIY','ZIII','IZII','IIZI', 'IIIZ']
coeffs = [0.5, -0.5, 0.5, -0.5, 0.5, -0.5, 0.5, -0.5, 1.0 , 1.0, 1.0, 1.0]

H = np.zeros((16, 16), dtype=complex)

# Construct Hamiltonian from terms list
for term_str, coeff in zip(terms, coeffs):
    # term_str e.g., 'XYII' maps to ops['X'], ops['Y'], ops['I'], ops['I']
    matrices = [ops[char] for char in term_str]
    H += coeff * krons(*matrices)

state = np.zeros(16, dtype=complex)
state[${StartNode}] = 1.0
`;
            } else if (SimulationType === "HamiltonianChain") {
                // --- DYNAMIC N-QUBIT LINEAR CHAIN ---
                initCode = commonHeader + `
n = ${currentQubits}
dim = 2**n
H = np.zeros((dim, dim), dtype=complex)

# 1. Interaction Terms (XX + YY)
for i in range(n - 1):
    # XX Term
    op_list_x = ['I'] * n
    op_list_x[i] = 'X'
    op_list_x[i+1] = 'X'
    term_x = krons(*[ops[o] for o in op_list_x])
    H += 0.5 * term_x
    
    # YY Term
    op_list_y = ['I'] * n
    op_list_y[i] = 'Y'
    op_list_y[i+1] = 'Y'
    term_y = krons(*[ops[o] for o in op_list_y])
    H += 0.5 * term_y

# 2. Field Terms (Z everywhere)
for i in range(n):
    op_list_z = ['I'] * n
    op_list_z[i] = 'Z'
    term_z = krons(*[ops[o] for o in op_list_z])
    H += 1.0 * term_z

state = np.zeros(dim, dtype=complex)
state[${StartNode}] = 1.0
`;
            }

            await pyodide.runPythonAsync(initCode);

            async function loop() {
                if (!running) return;
                timestep = step * 0.005; 
                
                const stepCode = `
import json
U = scipy.linalg.expm(-1j * H * ${timestep})
current_psi = U @ state
probs = np.abs(current_psi)**2
json.dumps(probs.tolist())
`;
                try {
                    let res = await pyodide.runPythonAsync(stepCode);
                    let probs = JSON.parse(res);
                    render(probs);
                    step++;
                    requestAnimationFrame(loop);
                } catch (e) {
                    console.error(e);
                    running = false;
                    alert("Simulation Error in Python Execution");
                }
            }
            loop();
        }

        function stop() { running = false; updateStatus("Stopped."); }

    </script>
</body>
</html>
